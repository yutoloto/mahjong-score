<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中山 爆速スコア表</title>
<link rel="manifest" href="/mahjong-score/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="中山スコア">
<link rel="apple-touch-icon" href="/mahjong-score/icon-192.png">
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;padding:12px;padding-bottom:40px}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}

.wrap{max-width:500px;margin:0 auto}

.hd{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.hd h1{font-size:22px;font-weight:900;color:#fff;letter-spacing:.02em}
.hd p{font-size:11px;color:#64748b}

.card{background:#1e293b;border-radius:16px;padding:16px;margin-bottom:12px}

.cfg-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cfg-top span{font-size:13px;font-weight:700;color:#cbd5e1}
.toggle{display:flex;border-radius:10px;overflow:hidden;border:1px solid #475569}
.toggle button{padding:6px 16px;font-size:13px;font-weight:700;border:none;cursor:pointer;background:#334155;color:#94a3b8;transition:all .15s}
.toggle button.on{background:#2563eb;color:#fff}
.rates{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.rate-box{background:#0f172a;border-radius:12px;padding:12px}
.rate-box label{font-size:11px;color:#64748b;display:block;margin-bottom:4px}
.rate-row{display:flex;align-items:center;gap:4px}
.rate-row input{background:transparent;border:none;outline:none;color:#fff;font-size:18px;font-weight:700;width:100%;text-align:right}
.rate-row span{color:#64748b;font-size:13px;flex-shrink:0}

.grid-wrap{background:#0f172a;border-radius:16px;overflow:hidden;margin-bottom:12px}
.grid-head{background:#0f172a;border-bottom:1px solid #1e293b;padding:8px 8px 4px}
.grid-head-row{display:flex;gap:4px;align-items:center}
.col-num{width:32px;flex-shrink:0;text-align:center;font-size:11px;color:#475569}
.col-p{flex:1;min-width:0}
.col-p input{width:100%;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:6px 4px;font-size:13px;font-weight:700;color:#93c5fd;text-align:center;outline:none}
.col-p input:focus{border-color:#3b82f6}
.col-diff{width:36px;flex-shrink:0;text-align:center;font-size:11px;color:#475569}
.grid-status{display:flex;justify-content:space-between;margin-top:4px;padding:0 2px}
.grid-status span{font-size:11px;color:#475569}
.err-badge{font-size:11px;font-weight:700;color:#f87171;animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

.grid-body{overflow-y:auto;max-height:55vh}
.grid-row{display:flex;gap:4px;align-items:center;padding:2px 8px;border-radius:8px;margin:1px 4px}
.grid-row.valid{background:#1e293b}
.grid-row.valid:nth-child(even){background:#172030}
.grid-row.invalid{background:rgba(239,68,68,.12)}
.row-num{width:32px;flex-shrink:0;text-align:center;font-size:11px;font-family:monospace;color:#475569}
.row-num.dim{color:#1e3a5f}
.row-cell{flex:1;min-width:0}
.row-cell input{width:100%;background:transparent;border:none;outline:none;text-align:center;font-size:15px;color:#e2e8f0;padding:6px 2px;caret-color:#60a5fa}
.row-cell input::placeholder{color:#1e3a5f}
.row-cell input:focus{background:rgba(96,165,250,.1);border-radius:6px}
.grid-row.invalid .row-cell input{color:#fca5a5}
.row-diff{width:36px;flex-shrink:0;text-align:center;font-size:12px;font-weight:700;font-family:monospace}
.row-diff.err{color:#f87171;animation:blink 1.5s ease-in-out infinite}
.row-diff.ok{color:#4ade80;font-size:11px}

.add-btn{width:100%;margin:8px 0 4px;padding:8px;border-radius:10px;background:transparent;border:1px dashed #334155;color:#64748b;font-size:12px;cursor:pointer}
.add-btn:hover{border-color:#475569;color:#94a3b8}

.chip-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.chip-title{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#fde68a}
.chip-ok{font-size:12px;font-weight:700;color:#4ade80}
.chip-err{font-size:12px;font-weight:700;color:#f87171;animation:blink 1.5s ease-in-out infinite}
.chip-cols{display:flex;gap:8px}
.chip-col{flex:1;min-width:0;text-align:center}
.chip-col .name{font-size:11px;color:#94a3b8;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip-col .box{background:#0f172a;border-radius:10px;border:1px solid #451a03;padding:6px 4px}
.chip-col input{width:100%;background:transparent;border:none;outline:none;text-align:center;font-size:20px;font-weight:800;color:#fbbf24;caret-color:#fbbf24}
.chip-col input::placeholder{color:#44403c;font-size:14px;font-weight:400}
.chip-col input:focus{background:rgba(251,191,36,.08);border-radius:6px}
.chip-col .unit{font-size:11px;color:#64748b;margin-top:2px}

.result-title{font-size:13px;font-weight:700;color:#cbd5e1;margin-bottom:12px}
.result-items{display:flex;flex-direction:column;gap:10px}
.result-item{background:#0f172a;border-radius:12px;padding:12px}
.result-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px}
.result-name{font-weight:700;color:#fff;font-size:15px}
.result-yen{font-size:24px;font-weight:900;font-family:monospace}
.result-yen.pos{color:#60a5fa}
.result-yen.neg{color:#f87171}
.result-sub{display:flex;gap:12px;font-size:11px;color:#64748b;margin-bottom:6px}
.result-sub b{color:#cbd5e1}
.result-sub .chip-amt{color:#fbbf24}
.result-sub .calc{margin-left:auto;color:#475569}
.result-bar{position:relative;height:6px;background:#1e293b;border-radius:99px;overflow:hidden}
.result-bar-fill{position:absolute;top:0;height:100%;border-radius:99px;transition:width .4s}
.result-bar-fill.pos{background:#3b82f6;right:50%}
.result-bar-fill.neg{background:#ef4444;left:50%}
.result-bar-mid{position:absolute;left:50%;top:0;width:1px;height:100%;background:#334155}
.rate-note{text-align:center;font-size:11px;color:#475569;margin-top:12px;padding-top:12px;border-top:1px solid #1e293b}
</style>
</head>
<body>
<div class="wrap">

  <div class="hd">
    <svg width="44" height="56" viewBox="0 0 48 62">
      <rect x="1" y="1" width="46" height="60" rx="6" fill="#f5f0e8" stroke="#b0956e" stroke-width="1.5"/>
      <rect x="3.5" y="3.5" width="41" height="55" rx="4" fill="none" stroke="#b0956e" stroke-width=".7"/>
      <text x="24" y="44" text-anchor="middle" font-family="serif" font-size="34" font-weight="900" fill="#cc0000">中山</text>
    </svg>
    <div>
      <h1>爆速スコア表</h1>
      <p>麻雀精算リアルタイム計算</p>
    </div>
  </div>

  <div class="card" id="settings">
    <div class="cfg-top">
      <span>設定</span>
      <div class="toggle">
        <button id="btn3" class="on" onclick="setPlayers(3)">3人</button>
        <button id="btn4" onclick="setPlayers(4)">4人</button>
      </div>
    </div>
    <div class="rates">
      <div class="rate-box">
        <label>点数レート（1pt）</label>
        <div class="rate-row">
          <input type="number" inputmode="numeric" id="ptRate" value="10" oninput="update()">
          <span>円</span>
        </div>
      </div>
      <div class="rate-box">
        <label>チップレート（1枚）</label>
        <div class="rate-row">
          <input type="number" inputmode="numeric" id="chipRate" value="50" oninput="update()">
          <span>円</span>
        </div>
      </div>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid-head">
      <div class="grid-head-row" id="headRow"></div>
      <div class="grid-status">
        <span id="filledCount">0局入力済み</span>
        <span id="errBadge" class="err-badge" style="display:none"></span>
      </div>
    </div>
    <div class="grid-body" id="gridBody"></div>
  </div>

  <div class="card" id="chipPanel">
    <div class="chip-head">
      <div class="chip-title">🪙 チップ（セッション合計）</div>
      <span id="chipStatus"></span>
    </div>
    <div class="chip-cols" id="chipCols"></div>
  </div>

  <div class="card">
    <div class="result-title">精算結果</div>
    <div class="result-items" id="results"></div>
    <div class="rate-note" id="rateNote"></div>
  </div>

</div>

<script>
const INIT_ROWS = 40;
const AUTO_ADD = 5;

let numP = 3;
let players = ['Aさん','Bさん','Cさん','Dさん'];
let rows = Array.from({length:INIT_ROWS}, () => Array(4).fill(''));
let chips = ['','','',''];

function num(v){ if(v===''||v==='-'||v==='+') return null; const n=+v; return isNaN(n)?null:n; }

function rowDiff(ri){
  let s=0, hasVal=false;
  for(let j=0;j<numP;j++){ const v=num(rows[ri][j]); if(v!==null){s+=v;hasVal=true;} }
  return {diff:s, empty:!hasVal};
}

function chipSum(){
  let s=0;
  for(let j=0;j<numP;j++) s+=(num(chips[j])??0);
  return s;
}

function setPlayers(n){
  numP=n;
  document.getElementById('btn3').className=n===3?'on':'';
  document.getElementById('btn4').className=n===4?'on':'';
  buildHead();
  buildGrid();
  buildChips();
  update();
}

function buildHead(){
  const el=document.getElementById('headRow');
  el.innerHTML='';
  el.innerHTML+='<div class="col-num">#</div>';
  for(let j=0;j<numP;j++){
    const d=document.createElement('div');
    d.className='col-p';
    const inp=document.createElement('input');
    inp.value=players[j];
    inp.maxLength=6;
    inp.dataset.pi=j;
    inp.oninput=e=>{players[j]=e.target.value; refreshChipNames(); update();};
    d.appendChild(inp);
    el.appendChild(d);
  }
  el.innerHTML+='<div class="col-diff">ズレ</div>';
}

function buildGrid(){
  const body=document.getElementById('gridBody');
  body.innerHTML='';
  for(let i=0;i<rows.length;i++) body.appendChild(makeRow(i));
  const btn=document.createElement('button');
  btn.className='add-btn';
  btn.textContent='＋ 10行追加';
  btn.onclick=()=>{
    for(let k=0;k<10;k++) rows.push(Array(4).fill(''));
    const b=document.getElementById('gridBody');
    const addBtn=b.lastElementChild;
    for(let k=rows.length-10;k<rows.length;k++){
      b.insertBefore(makeRow(k),addBtn);
    }
    update();
  };
  body.appendChild(btn);
}

function makeRow(i){
  const row=document.createElement('div');
  row.className='grid-row empty';
  row.id='row'+i;

  const numEl=document.createElement('div');
  numEl.className='row-num dim';
  numEl.id='rn'+i;
  numEl.textContent=i+1;
  row.appendChild(numEl);

  for(let j=0;j<numP;j++){
    const cell=document.createElement('div');
    cell.className='row-cell';
    const inp=document.createElement('input');
    inp.type='number';
    inp.inputMode='numeric';
    inp.placeholder='—';
    inp.value=rows[i][j];
    inp.dataset.ri=i;
    inp.dataset.pi=j;
    inp.oninput=e=>{
      rows[i][j]=e.target.value;
      autoExpand(i);
      updateRow(i);
      update();
    };
    inp.onkeydown=e=>{
      if(e.key==='Enter'||e.key==='Tab'){
        e.preventDefault();
        focusNext(i,j);
      }
    };
    cell.appendChild(inp);
    row.appendChild(cell);
  }

  const diff=document.createElement('div');
  diff.className='row-diff';
  diff.id='rd'+i;
  row.appendChild(diff);

  return row;
}

function focusNext(ri,pi){
  const next=ri*numP+pi+1;
  const allInputs=document.querySelectorAll('#gridBody .row-cell input');
  if(allInputs[next]) allInputs[next].focus();
}

function autoExpand(ri){
  let trailing=0;
  for(let i=rows.length-1;i>=0;i--){
    if(rows[i].every(v=>v==='')) trailing++; else break;
  }
  if(trailing<=AUTO_ADD){
    const body=document.getElementById('gridBody');
    const addBtn=body.lastElementChild;
    for(let k=0;k<10;k++){
      rows.push(Array(4).fill(''));
      body.insertBefore(makeRow(rows.length-1),addBtn);
    }
  }
}

function updateRow(i){
  const {diff,empty}=rowDiff(i);
  const rowEl=document.getElementById('row'+i);
  const numEl=document.getElementById('rn'+i);
  const diffEl=document.getElementById('rd'+i);
  if(!rowEl) return;
  if(empty){
    rowEl.className='grid-row empty';
    numEl.className='row-num dim';
    diffEl.textContent='';
    diffEl.className='row-diff';
  } else if(diff===0){
    rowEl.className='grid-row valid';
    numEl.className='row-num';
    diffEl.textContent='✓';
    diffEl.className='row-diff ok';
  } else {
    rowEl.className='grid-row invalid';
    numEl.className='row-num';
    diffEl.textContent=(diff>0?'+':'')+diff;
    diffEl.className='row-diff err';
  }
}

function buildChips(){
  const el=document.getElementById('chipCols');
  el.innerHTML='';
  for(let j=0;j<numP;j++){
    const col=document.createElement('div');
    col.className='chip-col';
    col.innerHTML=`<div class="name" id="cn${j}">${players[j]}</div>
      <div class="box"><input type="number" inputmode="numeric" placeholder="0" value="${chips[j]}" data-pi="${j}" oninput="chips[${j}]=this.value;update()"></div>
      <div class="unit">枚</div>`;
    el.appendChild(col);
  }
}

function refreshChipNames(){
  for(let j=0;j<numP;j++){
    const el=document.getElementById('cn'+j);
    if(el) el.textContent=players[j]||`P${j+1}`;
  }
}

function update(){
  let filled=0, invalid=0;
  for(let i=0;i<rows.length;i++){
    const {diff,empty}=rowDiff(i);
    if(!empty){ filled++; if(diff!==0) invalid++; }
  }
  document.getElementById('filledCount').textContent=filled+'局入力済み';
  const badge=document.getElementById('errBadge');
  if(invalid>0){badge.textContent=`⚠ ${invalid}行 合計≠0`;badge.style.display='';}
  else badge.style.display='none';

  const cs=chipSum();
  const chipHasVal=chips.slice(0,numP).some(v=>v!=='');
  const cst=document.getElementById('chipStatus');
  if(!chipHasVal) cst.textContent='';
  else if(cs===0){cst.className='chip-ok';cst.textContent='✓ 合計 0';}
  else{cst.className='chip-err';cst.textContent=`合計 ${cs>0?'+':''}${cs} ≠ 0`;}

  const pr=num(document.getElementById('ptRate').value)??10;
  const cr=num(document.getElementById('chipRate').value)??50;
  const totals=[];
  for(let j=0;j<numP;j++){
    let pt=0;
    for(let i=0;i<rows.length;i++) pt+=(num(rows[i][j])??0);
    const chip=num(chips[j])??0;
    const yen=pt*pr+chip*cr;
    totals.push({pt,chip,yen,name:players[j]||`P${j+1}`});
  }
  const maxAbs=Math.max(1,...totals.map(t=>Math.abs(t.yen)));
  const el=document.getElementById('results');
  el.innerHTML='';
  totals.forEach(({pt,chip,yen,name})=>{
    const isPos=yen>=0;
    const bw=Math.round(Math.abs(yen)/maxAbs*100);
    const div=document.createElement('div');
    div.className='result-item';
    div.innerHTML=`
      <div class="result-top">
        <span class="result-name">${name}</span>
        <span class="result-yen ${isPos?'pos':'neg'}">${isPos?'+':''}${yen.toLocaleString()}円</span>
      </div>
      <div class="result-sub">
        <span>pt: <b>${pt>0?'+':''}${pt}</b></span>
        <span>chip: <b class="chip-amt">${chip>0?'+':''}${chip}枚</b></span>
        <span class="calc">${(pt*pr>0?'+':'')}${(pt*pr).toLocaleString()} + ${(chip*cr>0?'+':'')}${(chip*cr).toLocaleString()}</span>
      </div>
      <div class="result-bar">
        <div class="result-bar-fill ${isPos?'pos':'neg'}" style="width:${bw/2}%"></div>
        <div class="result-bar-mid"></div>
      </div>`;
    el.appendChild(div);
  });
  document.getElementById('rateNote').textContent=`${pr}円/pt・${cr}円/chip`;
}

buildHead();
buildGrid();
buildChips();
for(let i=0;i<rows.length;i++) updateRow(i);
update();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/mahjong-score/sw.js');
}
</script>
</body>
</html>
