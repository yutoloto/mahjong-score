<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>麻雀スコア計算</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
    body { background: #0f172a; color: #f1f5f9; font-family: 'Helvetica Neue', Arial, sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .cell-input {
      width: 100%; background: transparent; border: none; outline: none;
      text-align: center; font-size: 15px; color: #f1f5f9;
      padding: 6px 2px; caret-color: #60a5fa; font-variant-numeric: tabular-nums;
    }
    .cell-input::placeholder { color: #334155; }
    .cell-input:focus { background: rgba(96,165,250,0.12); border-radius: 6px; }

    /* sticky header */
    .grid-header {
      position: sticky; top: 0; z-index: 10;
      background: #1e293b;
      border-bottom: 1px solid #334155;
    }

    .row-filled { background: #1e293b; }
    .row-invalid { background: rgba(239,68,68,0.12); }
    .row-empty { background: transparent; }
    .row-filled:nth-child(even) { background: #172030; }

    ::-webkit-scrollbar { height: 4px; width: 4px; }
    ::-webkit-scrollbar-track { background: #1e293b; }
    ::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
    .toggle-btn { transition: all 0.15s; }
    @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .pulse-red { animation: pulse-red 1.5s ease-in-out infinite; }

    .chip-input {
      width: 100%; background: transparent; border: none; outline: none;
      text-align: center; font-size: 20px; font-weight: 800; color: #fbbf24;
      caret-color: #fbbf24; padding: 4px 0;
    }
    .chip-input::placeholder { color: #44403c; font-weight: 400; font-size: 14px; }
    .chip-input:focus { background: rgba(251,191,36,0.1); border-radius: 6px; }

    /* 入力済み行の数字を少し明るく */
    .row-filled .cell-input:not(:placeholder-shown) { color: #e2e8f0; }
    .row-invalid .cell-input:not(:placeholder-shown) { color: #fca5a5; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useRef, useEffect, useMemo } = React;

const DEFAULT_PLAYERS_3 = ['Aさん', 'Bさん', 'Cさん'];
const DEFAULT_PLAYERS_4 = ['Aさん', 'Bさん', 'Cさん', 'Dさん'];
const INITIAL_ROWS = 40;
const AUTO_ADD_THRESHOLD = 5; // 残り5行以下になったら自動追加

function makeEmptyRow(n) {
  return Array.from({ length: n }, () => ({ pt: '' }));
}

function parseNum(v) {
  if (v === '' || v === '-' || v === '+') return null;
  const n = Number(v);
  return isNaN(n) ? null : n;
}

function rowStatus(cells) {
  const pts = cells.map(c => parseNum(c.pt));
  const allEmpty = pts.every(v => v === null);
  if (allEmpty) return { status: 'empty', diff: 0 };
  const ptSum = pts.reduce((a, b) => a + (b ?? 0), 0);
  return { status: ptSum === 0 ? 'valid' : 'invalid', diff: ptSum };
}

function rowStatusStr(cells) { return rowStatus(cells).status; }

function chipStatus(chips, numPlayers) {
  const vals = chips.slice(0, numPlayers).map(v => parseNum(v));
  const allEmpty = vals.every(v => v === null);
  if (allEmpty) return 'empty';
  const sum = vals.reduce((a, b) => a + (b ?? 0), 0);
  return sum === 0 ? 'valid' : 'invalid';
}

function SettingsPanel({ numPlayers, setNumPlayers, pointRate, setPointRate, chipRate, setChipRate }) {
  return (
    <div className="bg-slate-800 rounded-2xl p-4 mb-3 shadow-lg">
      <div className="flex items-center justify-between mb-3">
        <span className="text-sm font-bold text-slate-300">設定</span>
        <div className="flex rounded-xl overflow-hidden border border-slate-600">
          {[3,4].map(n => (
            <button key={n} onClick={() => setNumPlayers(n)}
              className={`toggle-btn px-4 py-1.5 text-sm font-bold ${numPlayers === n ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-400'}`}
            >{n}人</button>
          ))}
        </div>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-slate-700 rounded-xl p-3">
          <div className="text-xs text-slate-400 mb-1">点数レート（1pt）</div>
          <div className="flex items-center gap-1">
            <input type="number" inputMode="numeric" value={pointRate}
              onChange={e => setPointRate(e.target.value)}
              className="bg-transparent text-white font-bold text-lg w-full outline-none text-right"
              placeholder="10" />
            <span className="text-slate-400 text-sm shrink-0">円</span>
          </div>
        </div>
        <div className="bg-slate-700 rounded-xl p-3">
          <div className="text-xs text-slate-400 mb-1">チップレート（1枚）</div>
          <div className="flex items-center gap-1">
            <input type="number" inputMode="numeric" value={chipRate}
              onChange={e => setChipRate(e.target.value)}
              className="bg-transparent text-white font-bold text-lg w-full outline-none text-right"
              placeholder="50" />
            <span className="text-slate-400 text-sm shrink-0">円</span>
          </div>
        </div>
      </div>
    </div>
  );
}

function ScoreGrid({ players, setPlayers, rows, setRows, numPlayers }) {
  const inputRefs = useRef([]);

  const handleChange = useCallback((ri, pi, val) => {
    setRows(prev => {
      const next = prev.map(r => r.map(c => ({...c})));
      next[ri][pi].pt = val;
      return next;
    });
  }, [setRows]);

  const handleFocus = useCallback((ri) => {
    // 最後のほうに到達したら自動追加
    setRows(prev => {
      const emptyFromEnd = [...prev].reverse().findIndex(r => rowStatus(r).status !== 'empty');
      const trailingEmpty = emptyFromEnd === -1 ? prev.length : emptyFromEnd;
      if (trailingEmpty <= AUTO_ADD_THRESHOLD) {
        return [...prev, ...Array.from({ length: 10 }, () => makeEmptyRow(numPlayers))];
      }
      return prev;
    });
  }, [setRows, numPlayers]);

  const handleEnterNext = useCallback((ri, pi) => {
    const cur = ri * numPlayers + pi;
    const next = cur + 1;
    // 次のセルへ（行末なら次の行の先頭）
    if (inputRefs.current[next]) {
      inputRefs.current[next].focus();
    }
  }, [numPlayers]);

  const filledCount = useMemo(() => rows.filter(r => rowStatus(r).status !== 'empty').length, [rows]);
  const invalidCount = useMemo(() => rows.filter(r => rowStatus(r).status === 'invalid').length, [rows]);

  return (
    <div className="bg-slate-900 rounded-2xl overflow-hidden shadow-lg">
      {/* ヘッダー（固定） */}
      <div className="px-2 pt-2 pb-1 bg-slate-900 border-b border-slate-700">
        <div className="flex gap-1 items-center">
          <div className="w-9 shrink-0 text-center">
            <span className="text-xs text-slate-500">#</span>
          </div>
          {players.map((name, i) => (
            <div key={i} className="flex-1 min-w-0">
              <input
                value={name}
                onChange={e => {
                  const next = [...players];
                  next[i] = e.target.value;
                  setPlayers(next);
                }}
                className="w-full bg-slate-700 text-center text-sm font-bold text-blue-300 rounded-lg py-1 px-1 outline-none border border-slate-600 focus:border-blue-500"
                maxLength={6}
              />
            </div>
          ))}
          {/* ズレ列ヘッダー */}
          <div className="w-10 shrink-0 text-center">
            <span className="text-xs text-slate-500">ズレ</span>
          </div>
        </div>
        <div className="flex items-center justify-between mt-1 px-1">
          <span className="text-xs text-slate-500">{filledCount}局入力済み</span>
          {invalidCount > 0 && (
            <span className="text-xs text-red-400 pulse-red font-bold">⚠ {invalidCount}行 合計≠0</span>
          )}
        </div>
      </div>

      {/* 独立スクロール領域 */}
      <div className="overflow-y-auto px-2 pb-2" style={{ maxHeight: '55vh' }}>
        {rows.map((cells, ri) => {
          const { status, diff } = rowStatus(cells);
          const rowCls = status === 'invalid' ? 'row-invalid' : status === 'empty' ? 'row-empty' : 'row-filled';
          return (
            <div key={ri} className={`flex gap-1 rounded-lg transition-colors ${rowCls}`}
              style={{ marginBottom: '2px' }}>
              <div className="w-9 shrink-0 flex items-center justify-center">
                <span className={`text-xs font-mono ${status === 'empty' ? 'text-slate-700' : 'text-slate-400'}`}>
                  {ri + 1}
                </span>
              </div>
              {cells.map((cell, pi) => (
                <div key={pi} className="flex-1 min-w-0">
                  <input
                    ref={el => { inputRefs.current[ri * numPlayers + pi] = el; }}
                    type="number" inputMode="numeric"
                    value={cell.pt}
                    placeholder="—"
                    onChange={e => handleChange(ri, pi, e.target.value)}
                    onFocus={() => handleFocus(ri)}
                    onKeyDown={e => {
                      if (e.key === 'Enter' || e.key === 'Tab') {
                        e.preventDefault();
                        handleEnterNext(ri, pi);
                      }
                    }}
                    className="cell-input"
                  />
                </div>
              ))}
              {/* ズレ表示 */}
              <div className="w-10 shrink-0 flex items-center justify-center">
                {status === 'invalid' && (
                  <span className="text-xs font-bold tabular-nums text-red-400 pulse-red">
                    {diff > 0 ? '+' : ''}{diff}
                  </span>
                )}
                {status === 'valid' && (
                  <span className="text-xs text-green-500">✓</span>
                )}
              </div>
            </div>
          );
        })}

        {/* 手動追加ボタン */}
        <button
          onClick={() => setRows(prev => [...prev, ...Array.from({ length: 10 }, () => makeEmptyRow(numPlayers))])}
          className="w-full mt-2 py-2 rounded-xl text-xs text-slate-500 border border-dashed border-slate-700 hover:border-slate-500 hover:text-slate-400 transition-colors"
        >
          ＋ 10行追加
        </button>
      </div>
    </div>
  );
}

function ChipPanel({ players, chips, setChips, numPlayers }) {
  const status = chipStatus(chips, numPlayers);
  const sum = chips.slice(0, numPlayers).reduce((a, v) => a + (parseNum(v) ?? 0), 0);
  const borderCls = status === 'invalid' ? 'border-red-500/60' : status === 'valid' ? 'border-green-500/40' : 'border-yellow-500/20';

  return (
    <div className={`rounded-2xl p-4 mt-3 shadow-lg border bg-slate-800 ${borderCls}`}>
      <div className="flex items-center justify-between mb-3">
        <div className="flex items-center gap-2">
          <span className="text-base">🪙</span>
          <span className="text-sm font-bold text-yellow-300">チップ（セッション合計）</span>
        </div>
        {status === 'invalid' && (
          <div className="text-xs text-red-400 pulse-red font-bold">合計 {sum > 0 ? '+' : ''}{sum} ≠ 0</div>
        )}
        {status === 'valid' && (
          <div className="text-xs text-green-400 font-bold">✓ 合計 0</div>
        )}
      </div>
      <div className="flex gap-2">
        {players.map((name, i) => (
          <div key={i} className="flex-1 min-w-0 text-center">
            <div className="text-xs text-slate-400 mb-1 truncate">{name || `P${i+1}`}</div>
            <div className="bg-slate-700 rounded-xl border border-yellow-900/40 py-1.5 px-1">
              <input
                type="number" inputMode="numeric"
                value={chips[i] ?? ''}
                placeholder="0"
                onChange={e => {
                  const next = [...chips];
                  next[i] = e.target.value;
                  setChips(next);
                }}
                className="chip-input"
              />
            </div>
            <div className="text-xs text-slate-500 mt-1">枚</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ResultBar({ players, rows, chips, numPlayers, pointRate, chipRate }) {
  const pr = parseNum(pointRate) ?? 10;
  const cr = parseNum(chipRate) ?? 50;

  const totals = players.map((_, i) => {
    const pt = rows.reduce((s, row) => s + (parseNum(row[i].pt) ?? 0), 0);
    const chip = parseNum(chips[i]) ?? 0;
    const yen = pt * pr + chip * cr;
    return { pt, chip, yen };
  });

  const maxAbs = Math.max(1, ...totals.map(t => Math.abs(t.yen)));

  return (
    <div className="bg-slate-800 rounded-2xl p-4 mt-3 shadow-lg">
      <div className="text-sm font-bold text-slate-300 mb-3">精算結果</div>
      <div className="space-y-3">
        {players.map((name, i) => {
          const { pt, chip, yen } = totals[i];
          const isPos = yen >= 0;
          const barW = Math.round(Math.abs(yen) / maxAbs * 100);
          return (
            <div key={i} className="bg-slate-700 rounded-xl p-3">
              <div className="flex items-baseline justify-between mb-1">
                <span className="font-bold text-white">{name || `P${i+1}`}</span>
                <span className={`text-2xl font-black tabular-nums ${isPos ? 'text-blue-400' : 'text-red-400'}`}>
                  {isPos ? '+' : ''}{yen.toLocaleString()}円
                </span>
              </div>
              <div className="flex gap-3 text-xs text-slate-400 mb-2">
                <span>pt: <b className="text-slate-200">{pt > 0 ? '+' : ''}{pt}</b></span>
                <span>chip: <b className="text-yellow-400">{chip > 0 ? '+' : ''}{chip}枚</b></span>
                <span className="text-slate-500 ml-auto">
                  {(pt * pr > 0 ? '+' : '')}{(pt * pr).toLocaleString()} + {(chip * cr > 0 ? '+' : '')}{(chip * cr).toLocaleString()}
                </span>
              </div>
              <div className="relative h-1.5 bg-slate-600 rounded-full overflow-hidden">
                <div
                  className={`absolute h-full rounded-full transition-all duration-500 ${isPos ? 'bg-blue-500 right-1/2' : 'bg-red-500 left-1/2'}`}
                  style={{ width: `${barW / 2}%` }}
                />
                <div className="absolute left-1/2 top-0 h-full w-px bg-slate-400 opacity-40" />
              </div>
            </div>
          );
        })}
      </div>
      <div className="mt-3 pt-3 border-t border-slate-600 text-xs text-slate-500 text-center">
        {pr}円/pt・{cr}円/chip
      </div>
    </div>
  );
}

function App() {
  const [numPlayers, setNumPlayers] = useState(3);
  const [players, setPlayers] = useState(DEFAULT_PLAYERS_3);
  const [pointRate, setPointRate] = useState('10');
  const [chipRate, setChipRate] = useState('50');
  const [rows, setRows] = useState(() => Array.from({ length: INITIAL_ROWS }, () => makeEmptyRow(3)));
  const [chips, setChips] = useState(['', '', '', '']);

  useEffect(() => {
    const nextPlayers = numPlayers === 3 ? DEFAULT_PLAYERS_3.slice() : DEFAULT_PLAYERS_4.slice();
    setPlayers(nextPlayers);
    setRows(prev => prev.map(row => {
      const next = makeEmptyRow(numPlayers);
      for (let i = 0; i < Math.min(row.length, numPlayers); i++) next[i] = { pt: row[i].pt };
      return next;
    }));
  }, [numPlayers]);

  return (
    <div className="min-h-screen p-3 pb-10 max-w-lg mx-auto">
      <div className="mb-3 flex items-center gap-3">
        <svg width="48" height="62" viewBox="0 0 48 62" xmlns="http://www.w3.org/2000/svg">
          <rect x="1" y="1" width="46" height="60" rx="6" ry="6" fill="#f5f0e8" stroke="#b0956e" strokeWidth="1.5"/>
          <rect x="3.5" y="3.5" width="41" height="55" rx="4" ry="4" fill="none" stroke="#b0956e" strokeWidth="0.7"/>
          <text x="24" y="44" textAnchor="middle" dominantBaseline="auto" fontFamily="'Hiragino Mincho ProN','Yu Mincho','serif'" fontSize="34" fontWeight="900" fill="#cc0000">中山</text>
        </svg>
        <div>
          <h1 className="text-2xl font-black text-white tracking-wide">爆速スコア表</h1>
          <p className="text-xs text-slate-500">麻雀精算リアルタイム計算</p>
        </div>
      </div>

      <SettingsPanel
        numPlayers={numPlayers} setNumPlayers={setNumPlayers}
        pointRate={pointRate} setPointRate={setPointRate}
        chipRate={chipRate} setChipRate={setChipRate}
      />

      <ScoreGrid
        players={players} setPlayers={setPlayers}
        rows={rows} setRows={setRows}
        numPlayers={numPlayers}
      />

      <ChipPanel
        players={players} chips={chips}
        setChips={setChips} numPlayers={numPlayers}
      />

      <ResultBar
        players={players} rows={rows}
        chips={chips} numPlayers={numPlayers}
        pointRate={pointRate} chipRate={chipRate}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
